<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal - Home</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{background:#f5f7fb;}

nav{
    background:#2563eb;
    padding:15px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
    font-weight:600;
}

.hero{
    min-height:85vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    padding:40px;
}

.hero h1{font-size:3.5rem;}
.hero p{margin-top:15px;font-size:1.2rem;}

.hero button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:white;
    color:#2563eb;
    font-weight:bold;
    cursor:pointer;
}

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:60px 8%;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

footer{
    text-align:center;
    padding:20px;
    background:#111827;
    color:white;
}
</style>
</head>

<body>

<nav>
    <h2>🎓 Student Portal</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>Welcome Students</h1>
        <p>Manage courses, assignments and notices in one place</p>
        <button>Get Started</button>
    </div>
</section>

<section class="features">

    <div class="card">
        <h3>📚 Courses</h3>
        <p>Access all study materials</p>
    </div>

    <div class="card">
        <h3>📝 Assignments</h3>
        <p>Submit and track tasks</p>
    </div>

    <div class="card">
        <h3>📢 Notices</h3>
        <p>Stay updated with announcements</p>
    </div>

</section>

<footer>
© 2026 Student Portal
</footer>

</body>
</html>
